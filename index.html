<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zwin WinGo Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter','Segoe UI',Arial,sans-serif; background:#0a0a0a; color:#fff; overflow-x:hidden; }
        input, button, select { font-family:inherit; }
        .hidden { display:none !important; }

        :root {
            --gold: #FFD700;
            --gold-light: #FFE44D;
            --gold-dark: #FFA000;
            --purple: #7C4DFF;
            --purple-dark: #651FFF;
            --purple-bg: #1a0a2e;
            --pink: #E91E63;
            --pink-dark: #C2185B;
            --green: #00E676;
            --green-dark: #00C853;
            --red: #FF1744;
            --red-dark: #D50000;
            --orange: #FF9800;
            --orange-dark: #F57C00;
            --blue: #448AFF;
            --blue-dark: #2962FF;
            --bg: #0a0a0a;
            --bg-card: #111111;
            --bg-elevated: #1a1a1a;
            --bg-hover: #222222;
        }

        /* ===== LOADER ===== */
        #loader { position:fixed; inset:0; background:#0a0a0a; z-index:99999; display:flex; align-items:center; justify-content:center; flex-direction:column; }
        .loader-spinner { width:50px; height:50px; border:3px solid rgba(124,77,255,0.2); border-top-color:#7C4DFF; border-right-color:#FFD700; border-radius:50%; animation:spin 0.8s linear infinite; box-shadow:0 0 20px rgba(124,77,255,0.3); }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loader p { margin-top:15px; color:#7C4DFF; font-weight:600; letter-spacing:2px; font-size:14px; }

        /* ===== AUTH SCREEN ===== */
        #authScreen { position:fixed; inset:0; background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0a0a0a 100%); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .auth-screen-bg { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
        .auth-bg-orb { position:absolute; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle,rgba(124,77,255,0.2),transparent 70%); animation:orbFloat 8s ease-in-out infinite; }
        .auth-bg-orb:nth-child(1) { top:-100px; left:-100px; animation-delay:0s; }
        .auth-bg-orb:nth-child(2) { bottom:-100px; right:-100px; animation-delay:4s; width:400px; height:400px; background:radial-gradient(circle,rgba(233,30,99,0.15),transparent 70%); }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }

        .auth-logo { font-size:42px; font-weight:900; background:linear-gradient(135deg,#FFD700,#7C4DFF,#E91E63); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; letter-spacing:3px; font-family:'Playfair Display',serif; position:relative; z-index:1; }
        .auth-vip-badge { display:inline-flex; align-items:center; gap:4px; background:linear-gradient(135deg,#FFD700,#FFA000); color:#000; font-size:11px; font-weight:800; padding:4px 12px; border-radius:20px; margin-bottom:20px; letter-spacing:2px; position:relative; z-index:1; }
        .auth-sub { color:rgba(124,77,255,0.8); font-size:13px; margin-bottom:30px; letter-spacing:1px; position:relative; z-index:1; }
        .auth-box { background:linear-gradient(135deg,#111,#1a0a2e); border-radius:16px; padding:25px; width:100%; max-width:360px; border:1px solid rgba(124,77,255,0.3); box-shadow:0 10px 40px rgba(0,0,0,0.5),0 0 30px rgba(124,77,255,0.1); position:relative; z-index:1; }
        .auth-tabs { display:flex; margin-bottom:20px; border-bottom:1px solid rgba(124,77,255,0.2); }
        .auth-tab { flex:1; text-align:center; padding:12px; cursor:pointer; font-weight:600; color:#888; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.3s; }
        .auth-tab.active { color:#FFD700; border-bottom-color:#FFD700; }
        .auth-input { width:100%; padding:14px 16px; border:1px solid rgba(124,77,255,0.2); border-radius:10px; margin-bottom:12px; font-size:15px; outline:none; transition:.3s; background:#0a0a0a; color:#fff; }
        .auth-input:focus { border-color:#7C4DFF; box-shadow:0 0 10px rgba(124,77,255,0.2); }
        .auth-input::placeholder { color:#555; }
        .auth-btn { width:100%; padding:14px; background:linear-gradient(135deg,#FFD700,#FFA000); color:#000; border:none; border-radius:10px; font-size:16px; font-weight:800; cursor:pointer; transition:all 0.3s; letter-spacing:1px; }
        .auth-btn:hover { box-shadow:0 0 20px rgba(255,215,0,0.4); transform:translateY(-1px); }
        .auth-btn:active { transform:scale(0.98); }
        .auth-error { color:#FF1744; font-size:13px; margin-top:8px; text-align:center; display:none; }
        .auth-hint { text-align:center; font-size:12px; color:#555; margin-top:15px; }

        /* ===== COMPACT HEADER ===== */
        .header { background:linear-gradient(135deg,#1a0a2e 0%,#0f0518 100%); color:#fff; padding:8px 15px; position:sticky; top:0; z-index:100; box-shadow:0 2px 15px rgba(0,0,0,0.3); text-align:center; border-bottom:1px solid rgba(124,77,255,0.25); display:flex; align-items:center; justify-content:space-between; }
        .header-logo { font-size:18px; font-weight:900; letter-spacing:2px; background:linear-gradient(135deg,#FFD700,#7C4DFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-family:'Playfair Display',serif; }
        .header-vip { font-size:8px; background:linear-gradient(135deg,#FFD700,#FFA000); color:#000; padding:1px 6px; border-radius:8px; font-weight:800; vertical-align:middle; margin-left:4px; letter-spacing:1px; }
        .header-icons { display:flex; gap:12px; }
        .header-icons i { font-size:18px; color:#FFD700; }

        /* ===== WALLET CARD ===== */
        .wallet-card { background:linear-gradient(135deg,#1a0a2e,#0f0518); margin:10px 12px; border-radius:14px; padding:14px; border:1px solid rgba(124,77,255,0.3); box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 15px rgba(124,77,255,0.1); text-align:center; position:relative; overflow:hidden; }
        .wallet-card::before { content:''; position:absolute; top:-50%; right:-50%; width:100%; height:100%; background:radial-gradient(circle,rgba(124,77,255,0.08),transparent 70%); pointer-events:none; }
        .wallet-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#7C4DFF,transparent); }
        .wallet-amount { font-size:20px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:8px; color:#FFD700; font-family:'JetBrains Mono',monospace; }
        .wallet-amount i { color:#7C4DFF; font-size:16px; cursor:pointer; transition:0.3s; }
        .wallet-amount i:hover { transform:rotate(180deg); color:#FFD700; }
        .wallet-label { color:#888; font-size:11px; margin-top:3px; letter-spacing:1px; }
        .wallet-btns { display:flex; gap:10px; margin-top:12px; }
        .wallet-btn { flex:1; padding:10px; border-radius:25px; border:none; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:all 0.3s; }
        .wallet-btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.3); }
        .btn-withdraw { background:linear-gradient(135deg,#E91E63,#C2185B); color:#fff; }
        .btn-deposit { background:linear-gradient(135deg,#00E676,#00C853); color:#000; }

        /* ===== NOTICE BAR ===== */
        .notice-bar { background:linear-gradient(135deg,#1a1505,#0f0d02); margin:0 12px 10px; border-radius:10px; padding:8px 10px; display:flex; align-items:center; gap:8px; font-size:11px; color:#FFD700; border:1px solid rgba(255,215,0,0.2); }
        .notice-bar i { color:#FFD700; font-size:12px; flex-shrink:0; }
        .notice-text { flex:1; white-space:nowrap; overflow:hidden; }

        /* ===== GAME SECTION - GOLDEN CARD ===== */
        .game-section { background:linear-gradient(135deg,#FFD700,#FFA000,#FF8F00); margin:0 12px 10px; border-radius:14px; padding:12px; border:1px solid rgba(255,215,0,0.4); box-shadow:0 4px 20px rgba(255,152,0,0.2),0 0 30px rgba(255,215,0,0.1); position:relative; overflow:hidden; }
        .game-section::before { content:''; position:absolute; top:-50%; right:-50%; width:100%; height:100%; background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%); pointer-events:none; }

        .game-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0; position:relative; z-index:1; }
        .game-left { flex:1; }
        .game-title { font-size:13px; color:#000; font-weight:700; display:flex; align-items:center; gap:5px; margin-bottom:6px; }
        .how-to-play-btn { display:inline-flex; align-items:center; gap:4px; background:rgba(255,255,255,0.25); border:1px solid rgba(0,0,0,0.1); border-radius:20px; padding:5px 12px; font-size:11px; color:#000; font-weight:600; cursor:pointer; margin-bottom:6px; }
        .game-name { font-size:12px; color:rgba(0,0,0,0.6); font-weight:600; }

        .history-balls { display:flex; gap:5px; margin-top:4px; }
        .h-ball { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:10px; color:#fff; position:relative; box-shadow:0 0 6px rgba(0,0,0,0.3); }
        .h-ball::after { content:''; position:absolute; inset:-2px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.3); }
        .ball-green { background:linear-gradient(135deg,#00E676,#00C853); }
        .ball-red { background:linear-gradient(135deg,#FF1744,#D50000); }

        .game-timer-box { text-align:right; }
        .game-timer-label { font-size:11px; color:rgba(0,0,0,0.6); font-weight:600; }
        .game-timer { display:flex; gap:2px; justify-content:flex-end; margin-top:3px; }
        .timer-digit { background:#000; color:#FFD700; padding:5px 6px; border-radius:4px; font-size:16px; font-weight:800; min-width:26px; text-align:center; border:1px solid rgba(255,215,0,0.5); font-family:'JetBrains Mono',monospace; box-shadow:0 0 6px rgba(0,0,0,0.3); }
        .timer-sep { color:#000; font-weight:800; font-size:16px; }
        .timer-stopped .timer-digit { color:#555; }

        /* Period Number - Timer ke neeche */
        .period-row { text-align:right; position:relative; z-index:1; margin-top:4px; }
        .period-number { font-size:13px; font-weight:800; color:#000; font-family:'JetBrains Mono',monospace; letter-spacing:0.5px; }

        /* Divider line between left and timer */
        .game-divider { position:absolute; left:50%; top:10%; bottom:10%; width:1px; background:rgba(0,0,0,0.15); border-left:1px dashed rgba(0,0,0,0.2); z-index:1; }

        /* ===== COLOR BUTTONS ===== */
        .color-btns { display:flex; gap:8px; margin:0 12px 10px; }
        .color-btn { flex:1; padding:12px 8px; border-radius:10px; border:none; font-size:15px; font-weight:800; cursor:pointer; color:#fff; display:flex; align-items:center; justify-content:center; gap:5px; transition:all 0.3s; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
        .color-btn.green { background:linear-gradient(135deg,#00E676,#00C853); }
        .color-btn.red { background:linear-gradient(135deg,#FF1744,#D50000); }
        .color-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.4); }
        .color-btn:active { transform:scale(0.95); }

        /* ===== NUMBER GRID - 3D GLOSSY BILLIARD BALL STYLE ===== */
        .number-section { margin:0 12px 10px; }
        .number-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:10px; padding:10px; background:#0d0d0d; border-radius:14px; }
        .num-btn { aspect-ratio:1; border-radius:50%; border:none; font-size:18px; font-weight:800; cursor:pointer; color:#fff; display:flex; align-items:center; justify-content:center; position:relative; transition:all 0.3s; box-shadow:0 4px 10px rgba(0,0,0,0.5), inset 0 -3px 8px rgba(0,0,0,0.3), inset 0 3px 8px rgba(255,255,255,0.25); text-shadow:0 1px 3px rgba(0,0,0,0.5); }
        .num-btn:hover { transform:scale(1.1); filter:brightness(1.15); }
        .num-btn:active { transform:scale(0.92); }
        /* 3D glossy highlight on all balls */
        .num-btn::before { content:''; position:absolute; top:12%; left:15%; width:35%; height:30%; border-radius:50%; background:radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.7), rgba(255,255,255,0.15) 60%, transparent 70%); pointer-events:none; }
        .num-btn::after { content:''; position:absolute; bottom:8%; right:12%; width:25%; height:20%; border-radius:50%; background:radial-gradient(ellipse at center, rgba(255,255,255,0.15), transparent 70%); pointer-events:none; }
        .n-green { background:radial-gradient(circle at 35% 35%, #00E676 0%, #00C853 40%, #009624 100%); box-shadow:0 4px 12px rgba(0,200,83,0.4), inset 0 -3px 8px rgba(0,0,0,0.3), inset 0 3px 8px rgba(255,255,255,0.25); border:1.5px solid rgba(0,230,118,0.5); }
        .n-red { background:radial-gradient(circle at 35% 35%, #FF5252 0%, #FF1744 40%, #B71C1C 100%); box-shadow:0 4px 12px rgba(255,23,68,0.4), inset 0 -3px 8px rgba(0,0,0,0.3), inset 0 3px 8px rgba(255,255,255,0.25); border:1.5px solid rgba(255,82,82,0.5); }

        /* ===== MULTIPLIER BUTTONS ===== */
        .multiplier-btns { display:flex; gap:6px; margin-bottom:10px; }
        .multi-btn { flex:1; padding:8px 4px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:#1a1a1a; font-size:12px; font-weight:700; cursor:pointer; color:#888; transition:all 0.3s; text-align:center; }
        .multi-btn.active { background:linear-gradient(135deg,#00E676,#00C853); color:#000; border-color:transparent; }
        .multi-btn:hover:not(.active) { border-color:rgba(124,77,255,0.4); color:#ccc; }

        /* ===== BIG SMALL BUTTONS ===== */
        .bs-btns { display:flex; gap:8px; margin:0 12px 12px; }
        .bs-btn { flex:1; padding:14px; border-radius:12px; border:none; font-size:18px; font-weight:800; cursor:pointer; color:#fff; transition:all 0.3s; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
        .bs-btn.big-btn { background:linear-gradient(135deg,#FF9800,#F57C00); }
        .bs-btn.small-btn { background:linear-gradient(135deg,#448AFF,#2962FF); }
        .bs-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.4); }
        .bs-btn:active { transform:scale(0.95); }

        /* ===== BET AREA CONTAINER & LOCK OVERLAY ===== */
        .bet-area-container { position:relative; }
        .bet-lock-overlay {
            position:absolute;
            inset:0;
            z-index:50;
            display:none;
            align-items:center;
            justify-content:center;
            backdrop-filter:blur(8px) saturate(0.3);
            -webkit-backdrop-filter:blur(8px) saturate(0.3);
            background:rgba(0,0,0,0.65);
            border-radius:14px;
            animation:lockFadeIn 0.3s ease;
            pointer-events:all;
        }
        .bet-lock-overlay.active { display:flex; }
        @keyframes lockFadeIn { from { opacity:0; } to { opacity:1; } }
        .bet-lock-content {
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:8px;
            animation:lockPopIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes lockPopIn { from { opacity:0; transform:scale(0.6); } to { opacity:1; transform:scale(1); } }
        .bet-lock-icon {
            width:62px;
            height:62px;
            border-radius:50%;
            background:linear-gradient(135deg,#FF1744,#D50000);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:26px;
            color:#fff;
            box-shadow:0 0 20px rgba(255,23,68,0.5),0 0 40px rgba(255,23,68,0.2);
            animation:lockPulse 1.2s ease-in-out infinite;
        }
        @keyframes lockPulse { 0%,100%{box-shadow:0 0 20px rgba(255,23,68,0.5),0 0 40px rgba(255,23,68,0.2)} 50%{box-shadow:0 0 30px rgba(255,23,68,0.7),0 0 60px rgba(255,23,68,0.3)} }
        .bet-lock-countdown {
            display:flex;
            gap:16px;
            align-items:center;
            justify-content:center;
        }
        .countdown-card {
            background:#000;
            border-radius:16px;
            padding:14px 22px;
            min-width:110px;
            height:140px;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 6px 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,200,83,0.15);
            border:2px solid rgba(0,200,83,0.4);
        }
        .countdown-card span {
            font-size:90px;
            font-weight:900;
            color:#00E676;
            font-family:'JetBrains Mono',monospace;
            line-height:1;
            text-shadow:0 0 20px rgba(0,230,118,0.4);
        }
        .countdown-sep {
            font-size:60px;
            font-weight:900;
            color:#fff;
            font-family:'JetBrains Mono',monospace;
            line-height:1;
            text-shadow:0 2px 8px rgba(0,0,0,0.5);
        }
        @keyframes countdownPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .bet-lock-text {
            font-size:20px;
            font-weight:800;
            color:#FF1744;
            letter-spacing:3px;
            text-transform:uppercase;
            text-shadow:0 0 10px rgba(255,23,68,0.4);
        }
        .bet-lock-subtext {
            font-size:12px;
            color:#888;
            letter-spacing:1px;
        }

        /* ===== HISTORY TABLE ===== */
        .history-section { background:linear-gradient(135deg,#111,#1a0a2e); margin:0 12px 80px; border-radius:12px; padding:10px; border:1px solid rgba(124,77,255,0.15); }
        .section-title { font-size:14px; font-weight:700; color:#FFD700; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .history-tabs { display:flex; gap:8px; margin-bottom:8px; }
        .hist-tab { flex:1; padding:6px; border-radius:6px; border:none; font-size:11px; font-weight:600; cursor:pointer; text-align:center; background:#1a1a1a; color:#888; border:1px solid rgba(124,77,255,0.15); transition:all 0.3s; }
        .hist-tab.active { background:linear-gradient(135deg,#FFD700,#FFA000); color:#000; }
        .hist-table { width:100%; border-collapse:collapse; font-size:13px; }
        .hist-table th { padding:6px 3px; color:#7C4DFF; font-weight:700; text-align:center; border-bottom:2px solid rgba(124,77,255,0.2); font-size:12px; }
        .hist-table td { padding:5px 3px; text-align:center; border-bottom:1px solid rgba(124,77,255,0.08); color:#ccc; }
        .hist-table td.period-cell { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:#FFD700; letter-spacing:0.5px; }
        /* History colored balls in number column */
        .hist-ball {
